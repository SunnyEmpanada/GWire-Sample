openapi: 3.0.3
info:
  title: InsuranceNow API (GWire mock subset aligned with 2025.3)
  description: >
    Representative GET surface for GWire mock server. Replace with the official
    Guidewire export when available; redistribution may be restricted by license.
  version: "2025.3.0"
servers:
  - url: /
tags:
  - name: Addresses
  - name: Customers
  - name: Policies
  - name: Claims
  - name: Applications
  - name: Search
  - name: Products
  - name: Billing
  - name: Tasks
  - name: CodeRefs
  - name: Misc
  - name: GWire Extensions (non-InsuranceNow)
    description: >
      Custom endpoints added by the GWire mock. These are NOT part of the
      Guidewire InsuranceNow 2025.3 API surface — they exist to support
      features specific to this mock app (for example, policy risk ranking).

paths:
  /addresses/countries:
    get:
      tags: [Addresses]
      operationId: listCountries
      summary: List countries
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CountryList"
              example:
                countries:
                  - isoCd: US
                    name: United States

  /addresses/countries/{isoCd}:
    get:
      tags: [Addresses]
      operationId: getCountry
      parameters:
        - name: isoCd
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Country"
        "404":
          description: Not found

  /customers:
    get:
      tags: [Customers]
      operationId: listCustomers
      summary: List customers
      parameters:
        - name: page_size
          in: query
          schema:
            type: integer
            default: 100
        - name: page_token
          in: query
          schema:
            type: string
        - name: filter
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerListPage"

  /customers/{systemId}:
    get:
      tags: [Customers]
      operationId: getCustomer
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Customer"
        "404":
          description: Not found

  /customers/{systemId}/summary:
    get:
      tags: [Customers]
      operationId: getCustomerSummary
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerSummary"

  /customers/{systemId}/claims:
    get:
      tags: [Customers]
      operationId: listCustomerClaims
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimSummaryList"

  /policies:
    get:
      tags: [Policies]
      operationId: listPolicies
      parameters:
        - name: page_size
          in: query
          schema:
            type: integer
        - name: filter
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyListPage"

  /policies/{systemId}:
    get:
      tags: [Policies]
      operationId: getPolicy
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Not found

  /policies/{systemId}/full:
    get:
      tags: [Policies]
      operationId: getPolicyFull
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyFull"

  /policies/{systemId}/insuredPolicyDetails:
    get:
      tags: [Policies]
      operationId: getInsuredPolicyDetails
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsuredPolicyDetails"

  /policies/{systemId}/documents:
    get:
      tags: [Policies]
      operationId: listPolicyDocuments
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"

  /policies/{systemId}/insuredDocuments:
    get:
      tags: [Policies]
      operationId: listInsuredDocuments
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"

  /policies/{systemId}/lines/{lineCd}:
    get:
      tags: [Policies]
      operationId: getPolicyLine
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
        - name: lineCd
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PolicyLine"

  /claims/{systemId}/consumerSummary:
    get:
      tags: [Claims]
      operationId: getClaimConsumerSummary
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaimConsumerSummary"

  /claims/{systemId}/documents:
    get:
      tags: [Claims]
      operationId: listClaimDocuments
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentList"

  /search:
    get:
      tags: [Search]
      operationId: search
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: resourceType
          in: query
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchResults"

  /search/{resourceName}/{systemId}:
    get:
      tags: [Search]
      operationId: searchByResource
      parameters:
        - name: resourceName
          in: path
          required: true
          schema:
            type: string
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchHit"

  /applications/{systemId}:
    get:
      tags: [Applications]
      operationId: getApplication
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationStub"

  /applications/{systemId}/full:
    get:
      tags: [Applications]
      operationId: getApplicationFull
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationFull"

  /products:
    get:
      tags: [Products]
      operationId: listProducts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductList"

  /billingAccounts:
    get:
      tags: [Billing]
      operationId: listBillingAccounts
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingAccountList"

  /billingAccounts/{systemId}:
    get:
      tags: [Billing]
      operationId: getBillingAccount
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingAccount"

  /tasks:
    get:
      tags: [Tasks]
      operationId: listTasks
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"

  /tasks/{systemId}:
    get:
      tags: [Tasks]
      operationId: getTask
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /coderefs:
    get:
      tags: [CodeRefs]
      operationId: listCoderefs
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CodeRefList"

  /users:
    get:
      tags: [Misc]
      operationId: listUsers
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"

  /providers:
    get:
      tags: [Misc]
      operationId: listProviders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderList"

  /openWork:
    get:
      tags: [Misc]
      operationId: getOpenWork
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpenWorkQueue"

  /recentlyViewed:
    get:
      tags: [Misc]
      operationId: getRecentlyViewed
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecentlyViewed"

  /stats/summary:
    get:
      tags: [Misc]
      operationId: getStatsSummary
      summary: Portfolio aggregates (mock)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioStatsSummary"

  # ==============================================================
  # GWire Extensions — NOT part of InsuranceNow
  # The paths below are custom to the GWire mock and are not found
  # in the Guidewire InsuranceNow 2025.3 API surface.
  # ==============================================================

  /policies/{systemId}/riskRanking:
    post:
      tags: ["GWire Extensions (non-InsuranceNow)"]
      operationId: extUpsertPolicyRiskRanking
      summary: Upsert a risk ranking for a single policy (GWire extension)
      description: >
        GWire-only endpoint. Upserts a risk ranking for one category on one policy.
        `category` defaults to `THEFT` when omitted; `WATER` is accepted as an alias
        for `FLOOD`. Ranks may be sent by name (`LOW`/`MEDIUM`/`HIGH`) or number
        (`1`/`2`/`3`).
      parameters:
        - name: systemId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskRankingUpsert"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskRanking"
        "400":
          description: Invalid rank or category
        "404":
          description: Policy not found

  /riskRankings:
    post:
      tags: ["GWire Extensions (non-InsuranceNow)"]
      operationId: extUpsertRiskRankings
      summary: Bulk-upsert risk rankings across many policies (GWire extension)
      description: >
        GWire-only endpoint. Accepts an array of ranking items. Returns 200 when
        every item is accepted, or 207 when some are rejected; each rejection is
        reported individually in `errors`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/RiskRankingBulkItem"
      responses:
        "200":
          description: All items accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskRankingBulkResult"
        "207":
          description: Some items accepted, some rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskRankingBulkResult"
    delete:
      tags: ["GWire Extensions (non-InsuranceNow)"]
      operationId: extClearAllRiskRankings
      summary: Clear all stored risk rankings (GWire extension)
      description: >
        GWire-only endpoint. Wipes every stored risk ranking across all policies
        and all categories. Idempotent.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cleared:
                    type: integer
                    description: Number of policies that had at least one rank removed

  /riskRankings/{category}:
    delete:
      tags: ["GWire Extensions (non-InsuranceNow)"]
      operationId: extClearRiskRankingsByCategory
      summary: Clear all stored risk rankings for one category (GWire extension)
      description: >
        GWire-only endpoint. Wipes one category across every policy; other
        categories are untouched. `WATER` aliases to `FLOOD`.
      parameters:
        - name: category
          in: path
          required: true
          schema:
            $ref: "#/components/schemas/RiskCategoryInput"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  category:
                    $ref: "#/components/schemas/RiskCategory"
                  cleared:
                    type: integer
        "400":
          description: Invalid category

components:
  schemas:
    CountryList:
      type: object
      properties:
        countries:
          type: array
          items:
            $ref: "#/components/schemas/Country"
    Country:
      type: object
      properties:
        isoCd:
          type: string
        name:
          type: string

    CustomerListPage:
      type: object
      properties:
        customers:
          type: array
          items:
            $ref: "#/components/schemas/Customer"
        nextPageToken:
          type: string
          nullable: true

    Customer:
      type: object
      properties:
        systemId:
          type: string
        displayName:
          type: string
        primaryEmail:
          type: string
        primaryPhone:
          type: string
        address:
          $ref: "#/components/schemas/Address"
        accountNumber:
          type: string
        openClaimCount:
          type: integer
          description: Mock extension — count of OPEN and PENDING claims for this customer

    Address:
      type: object
      properties:
        addressLine1:
          type: string
        city:
          type: string
        stateProvCd:
          type: string
        postalCode:
          type: string
        countryCd:
          type: string

    CustomerSummary:
      type: object
      properties:
        systemId:
          type: string
        displayName:
          type: string
        policyCount:
          type: integer
        openClaimCount:
          type: integer

    ClaimSummaryList:
      type: object
      properties:
        claims:
          type: array
          items:
            $ref: "#/components/schemas/ClaimSummary"

    ClaimSummary:
      type: object
      properties:
        systemId:
          type: string
        claimNumber:
          type: string
        status:
          type: string
        lossDt:
          type: string
          format: date
        lossType:
          type: string
        policySystemId:
          type: string

    PolicyListPage:
      type: object
      properties:
        policies:
          type: array
          items:
            $ref: "#/components/schemas/Policy"
        nextPageToken:
          type: string
          nullable: true

    Policy:
      type: object
      properties:
        systemId:
          type: string
        policyNumber:
          type: string
        productCd:
          type: string
        lineCd:
          type: string
        status:
          type: string
        effectiveDt:
          type: string
          format: date
        expirationDt:
          type: string
          format: date
        customerSystemId:
          type: string
        riskRanks:
          description: >
            GWire extension (not part of InsuranceNow). Per-category risk ranks
            reported by an external ranker. All four keys are always present;
            `null` means no ranking has been received for that category.
          $ref: "#/components/schemas/PolicyRiskRanks"

    PolicyFull:
      allOf:
        - $ref: "#/components/schemas/Policy"
        - type: object
          properties:
            coverages:
              type: array
              items:
                type: object
                properties:
                  coverageCd:
                    type: string
                  limitAmount:
                    type: number
            risks:
              type: array
              items:
                type: object
                additionalProperties: true

    InsuredPolicyDetails:
      type: object
      properties:
        systemId:
          type: string
        policyNumber:
          type: string
        lineCd:
          type: string
        namedInsured:
          type: string

    PolicyLine:
      type: object
      properties:
        lineCd:
          type: string
        description:
          type: string

    DocumentList:
      type: object
      properties:
        documents:
          type: array
          items:
            type: object
            properties:
              documentId:
                type: string
              title:
                type: string

    ClaimConsumerSummary:
      type: object
      properties:
        systemId:
          type: string
        claimNumber:
          type: string
        status:
          type: string
        lossDescription:
          type: string
        paidAmount:
          type: number
        reserveAmount:
          type: number

    SearchResults:
      type: object
      properties:
        hits:
          type: array
          items:
            $ref: "#/components/schemas/SearchHit"

    SearchHit:
      type: object
      properties:
        resourceName:
          type: string
        systemId:
          type: string
        title:
          type: string

    ApplicationStub:
      type: object
      properties:
        systemId:
          type: string
        status:
          type: string

    ApplicationFull:
      type: object
      properties:
        systemId:
          type: string
        lines:
          type: array
          items:
            type: object
            additionalProperties: true

    ProductList:
      type: object
      properties:
        products:
          type: array
          items:
            type: object
            properties:
              productVersionId:
                type: string
              name:
                type: string

    BillingAccountList:
      type: object
      properties:
        billingAccounts:
          type: array
          items:
            $ref: "#/components/schemas/BillingAccount"

    BillingAccount:
      type: object
      properties:
        systemId:
          type: string
        accountNumber:
          type: string
        balance:
          type: number

    TaskList:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"

    Task:
      type: object
      properties:
        systemId:
          type: string
        subject:
          type: string
        status:
          type: string

    CodeRefList:
      type: object
      properties:
        packages:
          type: array
          items:
            type: object
            additionalProperties: true

    UserList:
      type: object
      properties:
        users:
          type: array
          items:
            type: object
            properties:
              loginId:
                type: string
              displayName:
                type: string

    ProviderList:
      type: object
      properties:
        providers:
          type: array
          items:
            type: object
            properties:
              systemId:
                type: string
              name:
                type: string

    OpenWorkQueue:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            additionalProperties: true

    RecentlyViewed:
      type: object
      properties:
        entries:
          type: array
          items:
            type: object
            properties:
              resourceName:
                type: string
              systemId:
                type: string

    PortfolioStatsSummary:
      type: object
      properties:
        claimCounts:
          type: object
          properties:
            open:
              type: integer
              description: OPEN + PENDING
            closed:
              type: integer
            denied:
              type: integer
        totalPaidAllClaims:
          type: number
        totalOpenClaimsAmount:
          type: number
          description: Sum of paid + reserve on OPEN and PENDING claims
        topCitiesByCustomers:
          type: array
          items:
            type: object
            properties:
              city:
                type: string
              customerCount:
                type: integer

    # ==============================================================
    # GWire Extensions — NOT part of InsuranceNow
    # The schemas below back the GWire custom endpoints documented
    # above under the "GWire Extensions (non-InsuranceNow)" tag.
    # ==============================================================

    RiskRank:
      type: string
      enum: [LOW, MEDIUM, HIGH]
      description: GWire extension — three-level policy risk ranking.

    RiskCategory:
      type: string
      enum: [THEFT, FIRE, FLOOD, EARTHQUAKE]
      description: >
        GWire extension — canonical category name stored by the server.
        Input is normalized from case variants (and `WATER` -> `FLOOD`).

    RiskCategoryInput:
      type: string
      description: >
        GWire extension — accepted on input for a category. Canonical values
        are THEFT, FIRE, FLOOD, EARTHQUAKE (case-insensitive); `WATER` is
        accepted as an alias for FLOOD.
      enum: [THEFT, FIRE, FLOOD, EARTHQUAKE, WATER, theft, fire, flood, earthquake, water]

    RiskRankInput:
      description: >
        GWire extension — accepted rank on input. `LOW`/`MEDIUM`/`HIGH`
        (case-insensitive), or numeric 1/2/3, or the numeric strings "1"/"2"/"3".
      oneOf:
        - type: string
        - type: integer
          enum: [1, 2, 3]

    PolicyRiskRanks:
      type: object
      description: >
        GWire extension — per-category rank for one policy. All four keys are
        always present; `null` means no ranking has been received for that slot.
      properties:
        theft:
          type: string
          nullable: true
          enum: [LOW, MEDIUM, HIGH, null]
        fire:
          type: string
          nullable: true
          enum: [LOW, MEDIUM, HIGH, null]
        flood:
          type: string
          nullable: true
          enum: [LOW, MEDIUM, HIGH, null]
        earthquake:
          type: string
          nullable: true
          enum: [LOW, MEDIUM, HIGH, null]

    RiskRankingUpsert:
      type: object
      description: GWire extension — request body for per-policy risk upsert.
      required: [rank]
      properties:
        rank:
          $ref: "#/components/schemas/RiskRankInput"
        category:
          $ref: "#/components/schemas/RiskCategoryInput"

    RiskRankingBulkItem:
      type: object
      description: GWire extension — one entry in a bulk risk-ranking upsert.
      required: [policySystemId, rank]
      properties:
        policySystemId:
          type: string
        rank:
          $ref: "#/components/schemas/RiskRankInput"
        category:
          $ref: "#/components/schemas/RiskCategoryInput"

    RiskRanking:
      type: object
      description: GWire extension — canonical stored form of a single ranking.
      properties:
        policySystemId:
          type: string
        category:
          $ref: "#/components/schemas/RiskCategory"
        rank:
          $ref: "#/components/schemas/RiskRank"

    RiskRankingBulkResult:
      type: object
      description: GWire extension — response from the bulk upsert endpoint.
      properties:
        accepted:
          type: array
          items:
            $ref: "#/components/schemas/RiskRanking"
        errors:
          type: array
          items:
            type: object
            properties:
              policySystemId:
                type: string
                nullable: true
              error:
                type: string
